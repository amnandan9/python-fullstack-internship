1) Frontend
--------------------------------

- Username field
- Password field
- Submit button
- Reset button

Technologies used:
- HTML
- CSS
- JavaScript
- React.js
- Vue.js

Definition:
Frontend is whatever the user sees on the UI.


2) Business Layer / Middle Layer
--------------------------------
Used to write business logic.
Also called Business Layer / Business Logic Layer.

Technologies used:
- Java
- Python
- C
- C++
- C#
- Ruby
- Node.js
- Express.js


3) Database
--------------------------------
It is the place where we store the data 
in the form of tables.

Database Technologies:
- SQL
- NoSQL
- MongoDB
- MySQL
- PostgreSQL


Example:
VTU Website (Crash course example)


N-Tier Architecture
--------------------------------
In N-Tier Architecture:
- We have one frontend
- Multiple middle layers
- Multiple servers
- Database

In this architecture, the load of the users 
will be distributed equally.

Examples:
- Flipkart
- Amazon
- Myntra
