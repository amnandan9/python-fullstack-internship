CSS
--------------------------------
CSS stands for Cascading Style Sheet.

- CSS is used to apply colors and effects to webpages.
- "Håkon Wium Lie" is the developer of CSS.
- In the year 1996, CSS was developed.
- Current version of CSS is CSS3.
- File extension: .css


Ways to Add CSS
--------------------------------
1) Inline CSS
2) Internal CSS
3) External CSS

Priority Order:
- Inline CSS has the highest priority.
- Between internal and external CSS, priority depends on order of occurrence.
- If all three are compared → Inline > Internal > External.


Selectors in CSS
--------------------------------
Selectors are used to target HTML elements and apply CSS.

There are 5 types of selectors:

1) Simple Selector
2) Combinator Selector
3) Pseudo Class Selector
4) Pseudo Element Selector
5) Attribute Selector


Simple Selectors
--------------------------------
Simple selectors have 5 ways to target an HTML element:

a) ID Selector
   - Used to target an individual HTML element.
   - Represented by symbol: #
   - Example: #idName

b) Class Selector
   - Used to target multiple HTML elements based on class name.
   - Represented by symbol: .
   - Example: .className

c) Grouping Selector
   - Used to target multiple elements together.
   - Example: h1, p, div

d) Tag Name Selector
   - Used to target elements based on tag name.
   - Represented by tag name.
   - Example: p, div, h1

e) Universal Selector
   - Used to target the complete HTML page including body.
   - Represented by symbol: *
   - Example: *


Pseudo Element Selectors
--------------------------------
Used to style specific parts of elements.

Examples:
- ::before → Inserts content before an element.
- ::after → Inserts content after an element.
- ::selection → Highlights selected content.
- ::marker → Styles list item markers.
- ::first-line → Styles first line of a paragraph.
- ::first-letter → Styles first letter of text.


Combinator Selectors
--------------------------------
Combinator selectors are used to define relationships between elements.

1) Descendant Selector
   - Targets all child elements inside a parent element.
   - Represented by a space ( ).
   - Example:
     section p { }
   - Targets all <p> inside <section> (children, grandchildren, etc.)

2) Child Selector
   - Targets only direct children of a parent element.
   - Represented by symbol: >
   - Example:
     section > p { }
   - Targets only immediate <p> children of <section>.

3) Adjacent Sibling Selector
   - Targets the immediate next sibling.
   - Represented by symbol: +
   - Example:
     section + p { }
   - Targets first <p> immediately after <section>.

4) General Sibling Selector
   - Targets all siblings after a specified element.
   - Represented by symbol: ~
   - Example:
     section ~ p { }
   - Targets all <p> siblings after <section>.


Pseudo Class Selectors
--------------------------------
Pseudo classes define a special state of an element.

Types:

1) Structural Pseudo Classes
   - :first-child
   - :last-child
   - :nth-child()

2) Dynamic Pseudo Classes
   - :link
   - :active
   - :visited
   - :hover

Example:
  a:hover {
    color: purple;
  }


Attribute Selectors
--------------------------------
Used to target elements based on attribute.

Syntax:

1) Tagname[attribute]
   Example:
     img[src]

2) Tagname[attribute="value"]
   Example:

Example CSS:
