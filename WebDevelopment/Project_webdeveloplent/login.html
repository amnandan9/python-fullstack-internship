<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PandaFoodCart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    
    <div class="glass-container">
        <h2>Welcome Back</h2>
        <p style="margin-bottom: 25px; color: var(--text-dark);">Login to order your favorite food</p>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Login</button>
        </form>
        
        <p style="margin-top: 20px;">
            Don't have an account? <a href="signup.html">Sign up</a>
        </p>
        <p style="margin-top: 10px;">
            <a href="index.html" style="font-size: 14px; opacity: 0.8;">&larr; Back to Home</a>
        </p>
    </div>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
