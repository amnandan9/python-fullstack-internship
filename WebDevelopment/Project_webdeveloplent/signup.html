<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | PandaFoodCart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    
    <div class="glass-container">
        <h2>Create Account</h2>
        <p style="margin-bottom: 25px; color: var(--text-dark);">Join PandaFoodCart today</p>
        
        <form id="signupForm">
            <div class="form-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="tel" name="phone" placeholder="Phone Number" required>
            </div>
            <div class="form-group" style="display: flex; gap: 10px;">
                <input type="date" name="dob" title="Date of Birth" required style="width: 60%">
                <input type="number" name="age" placeholder="Age" required style="width: 40%">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Sign Up</button>
        </form>
        
        <p style="margin-top: 20px;">
            Already have an account? <a href="login.html">Login</a>
        </p>
        <p style="margin-top: 10px;">
            <a href="index.html" style="font-size: 14px; opacity: 0.8;">&larr; Back to Home</a>
        </p>
    </div>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
